name: All Tests

on: pull_request

jobs:
  lint:
    name: Lint and typecheck Python code
    runs-on:
      - runs-on=${{ github.run_id }}
      - job=lint
      - extras=s3-cache
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: citizensadvice/python-uv-setup-action@7da89585988537f240cbc9833829f3fdfeb7aa2a
      - uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b
      - run: just lint

  audit:
    name: Audit dependencies
    runs-on:
      - runs-on=${{ github.run_id }}
      - job=audit-dependencies
      - extras=s3-cache
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          sparse-checkout: |
            uv.lock
            justfile
            pyproject.toml
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
      - uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b
      - run: just audit
